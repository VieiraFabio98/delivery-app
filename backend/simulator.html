<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tozetto — Simulador WhatsApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111b21;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .phone {
      width: 420px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      height: 680px;
    }

    .header {
      background: #075e54;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #25d366;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 600; color: white; flex-shrink: 0;
    }

    .header-info .name { font-size: 15px; font-weight: 500; color: white; }
    .header-info .status { font-size: 12px; color: rgba(255,255,255,0.65); }

    .messages {
      flex: 1;
      background: #0b141a;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .bubble {
      max-width: 82%;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
      color: #e9edef;
    }
    .bubble.user {
      background: #005c4b;
      align-self: flex-end;
      border-radius: 8px 8px 2px 8px;
      padding: 7px 12px 8px;
    }
    .bubble.bot {
      background: #202c33;
      align-self: flex-start;
      border-radius: 8px 8px 8px 2px;
      padding: 0;
      overflow: hidden;
    }
    .bubble.bot .bubble-text {
      padding: 7px 12px 8px;
      white-space: pre-wrap;
    }
    .bubble .time {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      float: right;
      margin-left: 8px;
      margin-top: 2px;
    }

    .btn-group {
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
    }
    .btn-group button {
      background: none;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: #53bdeb;
      font-size: 14px;
      padding: 10px 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s;
      font-family: inherit;
    }
    .btn-group button:first-child { border-top: none; }
    .btn-group button:hover { background: rgba(255,255,255,0.05); }
    .btn-group button:disabled { color: #8696a0; cursor: default; }

    .list-toggle {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #53bdeb;
      font-size: 14px;
      cursor: pointer;
      background: none;
      border-left: none;
      border-right: none;
      border-bottom: none;
      width: 100%;
      transition: background 0.1s;
      font-family: inherit;
    }
    .list-toggle:hover { background: rgba(255,255,255,0.05); }
    .list-toggle:disabled { color: #8696a0; cursor: default; }

    .list-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100;
    }

    .list-sheet {
      background: #202c33;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 420px;
      max-height: 70vh;
      overflow-y: auto;
      padding-bottom: 24px;
    }

    .list-sheet-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 15px;
      font-weight: 600;
      color: #e9edef;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: #202c33;
    }

    .list-sheet-header .close {
      background: none; border: none;
      color: #8696a0; font-size: 20px; cursor: pointer; line-height: 1;
    }

    .list-section-title {
      padding: 12px 16px 4px;
      font-size: 12px;
      color: #8696a0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .list-row {
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.1s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .list-row:hover { background: rgba(255,255,255,0.05); }
    .list-row .row-title { font-size: 14px; color: #e9edef; }
    .list-row .row-desc { font-size: 12px; color: #8696a0; margin-top: 2px; }

    .status-msg {
      text-align: center;
      font-size: 11px;
      color: #8696a0;
      padding: 4px 0;
    }

    .footer {
      background: #202c33;
      padding: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .footer input {
      flex: 1;
      background: #2a3942;
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      color: #e9edef;
      outline: none;
      font-family: inherit;
    }
    .footer input::placeholder { color: #8696a0; }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #00a884;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #00c49a; }
  </style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="avatar">T</div>
    <div class="header-info">
      <p class="name">Tozetto Bot</p>
      <p class="status" id="status-bar">conectando...</p>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="footer">
    <input id="input" type="text" placeholder="Digite uma mensagem..." />
    <button class="send-btn" onclick="sendText()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const BASE = 'http://localhost:3000'
  const FAKE_PHONE = '554200000001'

  function now() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
  }

  function addUserBubble(text) {
    const msgs = document.getElementById('messages')
    const el = document.createElement('div')
    el.className = 'bubble user'
    el.innerHTML = `${text}<span class="time">${now()}</span>`
    msgs.appendChild(el)
    msgs.scrollTop = msgs.scrollHeight
  }

  function addBotText(text) {
    const msgs = document.getElementById('messages')
    const el = document.createElement('div')
    el.className = 'bubble bot'
    el.innerHTML = `<div class="bubble-text">${text}<span class="time">${now()}</span></div>`
    msgs.appendChild(el)
    msgs.scrollTop = msgs.scrollHeight
  }

  function addBotButtons(bodyText, buttons) {
    const msgs = document.getElementById('messages')
    const el = document.createElement('div')
    el.className = 'bubble bot'

    const btnsHTML = buttons.map(b =>
      `<button onclick="clickButton('${b.id}', '${b.title}', this.closest('.btn-group'))">${b.title}</button>`
    ).join('')

    el.innerHTML = `
      <div class="bubble-text">${bodyText}<span class="time">${now()}</span></div>
      <div class="btn-group">${btnsHTML}</div>
    `
    msgs.appendChild(el)
    msgs.scrollTop = msgs.scrollHeight
  }

  function addBotList(bodyText, buttonLabel, sections) {
    const msgs = document.getElementById('messages')
    const el = document.createElement('div')
    el.className = 'bubble bot'

    const sectionsData = encodeURIComponent(JSON.stringify(sections))
    el.innerHTML = `
      <div class="bubble-text">${bodyText}<span class="time">${now()}</span></div>
      <button class="list-toggle" onclick="openList('${sectionsData}', this)">☰ ${buttonLabel}</button>
    `
    msgs.appendChild(el)
    msgs.scrollTop = msgs.scrollHeight
  }

  function addStatus(text) {
    const msgs = document.getElementById('messages')
    const el = document.createElement('div')
    el.className = 'status-msg'
    el.innerText = text
    msgs.appendChild(el)
  }

  function clickButton(id, title, group) {
    group.querySelectorAll('button').forEach(b => b.disabled = true)
    addUserBubble(title)
    postWebhook({
      type: 'interactive',
      interactive: { type: 'button_reply', button_reply: { id, title } }
    })
  }

  function openList(sectionsData, btn) {
    const sections = JSON.parse(decodeURIComponent(sectionsData))
    btn.disabled = true

    const modal = document.createElement('div')
    modal.className = 'list-modal'

    const rowsHTML = sections.map(s => `
      <div class="list-section-title">${s.title}</div>
      ${s.rows.map(r => `
        <div class="list-row" onclick="selectListItem('${r.id}', '${r.title}', this.closest('.list-modal'))">
          <div class="row-title">${r.title}</div>
          ${r.description ? `<div class="row-desc">${r.description}</div>` : ''}
        </div>
      `).join('')}
    `).join('')

    modal.innerHTML = `
      <div class="list-sheet">
        <div class="list-sheet-header">
          Selecione uma opção
          <button class="close" onclick="this.closest('.list-modal').remove(); document.querySelector('.list-toggle:disabled').disabled = false">✕</button>
        </div>
        ${rowsHTML}
      </div>
    `
    document.body.appendChild(modal)
  }

  function selectListItem(id, title, modal) {
    modal.remove()
    addUserBubble(title)
    postWebhook({
      type: 'interactive',
      interactive: { type: 'list_reply', list_reply: { id, title } }
    })
  }

  async function sendText() {
    const input = document.getElementById('input')
    const text = input.value.trim()
    if (!text) return
    input.value = ''
    addUserBubble(text)
    await postWebhook({ type: 'text', text: { body: text } })
  }

  async function postWebhook(messagePart) {
    const payload = {
      object: 'whatsapp_business_account',
      entry: [{
        changes: [{
          value: {
            messaging_product: 'whatsapp',
            messages: [{ from: FAKE_PHONE, ...messagePart }]
          },
          field: 'messages'
        }]
      }]
    }
    try {
      await fetch(`${BASE}/webhook/whatsapp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
    } catch(e) {
      addStatus('erro ao conectar com o servidor')
    }
  }

  async function pollMessages() {
    try {
      const res = await fetch(`${BASE}/simulator/messages`)
      if (res.ok) {
        const msgs = await res.json()
        msgs.forEach(renderBotMessage)
        document.getElementById('status-bar').innerText = 'online'
      }
    } catch(e) {
      document.getElementById('status-bar').innerText = 'servidor offline'
    }
  }

  function renderBotMessage(m) {
    const body = m.body
    if (!body) return

    if (body.type === 'text') {
      addBotText(body.text?.body ?? '')

    } else if (body.type === 'interactive') {
      const interactive = body.interactive
      const bodyText = interactive?.body?.text ?? ''

      if (interactive?.type === 'button') {
        const buttons = interactive.action?.buttons?.map(b => ({
          id: b.reply.id,
          title: b.reply.title
        })) ?? []
        addBotButtons(bodyText, buttons)

      } else if (interactive?.type === 'list') {
        const buttonLabel = interactive.action?.button ?? 'Ver opções'
        const sections = interactive.action?.sections ?? []
        addBotList(bodyText, buttonLabel, sections)
      }
    }
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendText()
  })

  addStatus('simulador local — localhost:3000')
  setInterval(pollMessages, 10000)
</script>
</body>
</html>
