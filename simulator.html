<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tozetto — Simulador WhatsApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111b21;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .phone {
      width: 420px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      height: 680px;
    }

    .header {
      background: #075e54;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #25d366;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .header-info p { margin: 0; }
    .header-info .name { font-size: 15px; font-weight: 500; color: white; }
    .header-info .status { font-size: 12px; color: rgba(255,255,255,0.65); }

    .messages {
      flex: 1;
      background: #0b141a;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .bubble {
      max-width: 78%;
      padding: 7px 12px 8px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
      position: relative;
    }

    .bubble.user {
      background: #005c4b;
      color: #e9edef;
      align-self: flex-end;
      border-radius: 8px 8px 2px 8px;
    }

    .bubble.bot {
      background: #202c33;
      color: #e9edef;
      align-self: flex-start;
      border-radius: 8px 8px 8px 2px;
    }

    .bubble .time {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      float: right;
      margin-left: 8px;
      margin-top: 2px;
    }

    .status-msg {
      text-align: center;
      font-size: 11px;
      color: #8696a0;
      padding: 4px 0;
    }

    .footer {
      background: #202c33;
      padding: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .footer input {
      flex: 1;
      background: #2a3942;
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      color: #e9edef;
      outline: none;
    }

    .footer input::placeholder { color: #8696a0; }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #00a884;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #00c49a; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="avatar">T</div>
      <div class="header-info">
        <p class="name">Tozetto Bot</p>
        <p class="status" id="status-bar">conectando...</p>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="footer">
      <input id="input" type="text" placeholder="Digite uma mensagem..." />
      <button class="send-btn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const BASE = 'http://localhost:3000'
    const FAKE_PHONE = '554200000001'

    function now() {
      return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
    }

    function addMessage(text, from) {
      const msgs = document.getElementById('messages')
      const bubble = document.createElement('div')
      bubble.className = `bubble ${from}`
      bubble.innerHTML = `${text}<span class="time">${now()}</span>`
      msgs.appendChild(bubble)
      msgs.scrollTop = msgs.scrollHeight
    }

    function addStatus(text) {
      const msgs = document.getElementById('messages')
      const el = document.createElement('div')
      el.className = 'status-msg'
      el.innerText = text
      msgs.appendChild(el)
    }

    function extractText(body) {
      if (!body) return null
      if (typeof body === 'string') return body
      if (body.text?.body) return body.text.body
      if (body.text) return body.text
      if (body.interactive?.body?.text) return body.interactive.body.text
      return JSON.stringify(body)
    }

    async function sendMessage() {
      const input = document.getElementById('input')
      const text = input.value.trim()
      if (!text) return
      input.value = ''

      addMessage(text, 'user')

      const payload = {
        object: 'whatsapp_business_account',
        entry: [{
          changes: [{
            value: {
              messaging_product: 'whatsapp',
              messages: [{
                from: FAKE_PHONE,
                type: 'text',
                text: { body: text }
              }]
            },
            field: 'messages'
          }]
        }]
      }

      try {
        await fetch(`${BASE}/webhook/whatsapp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
      } catch(e) {
        addStatus('erro ao conectar com o servidor')
      }
    }

    async function pollMessages() {
      try {
        const res = await fetch(`${BASE}/simulator/messages`)
        if (res.ok) {
          const msgs = await res.json()
          msgs.forEach(m => {
            const text = extractText(m.body)
            if (text) addMessage(text, 'bot')
          })
          document.getElementById('status-bar').innerText = 'online'
        }
      } catch(e) {
        document.getElementById('status-bar').innerText = 'servidor offline'
      }
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage()
    })

    addStatus('simulador local — localhost:3000')
    setInterval(pollMessages, 10000)
  </script>
</body>
</html>
